<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            padding: 24px;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 24px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
        }

        .card {
            background: #1e2130;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2d3148;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #94a3b8;
        }

        .badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 999px;
            font-weight: 600;
        }

        .badge-rfid { background: #1e3a5f; color: #60a5fa; }
        .badge-bme { background: #1a3a2a; color: #4ade80; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }

        thead th {
            text-align: left;
            padding: 6px 10px;
            color: #64748b;
            font-weight: 600;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 1px solid #2d3148;
        }

        tbody tr {
            border-bottom: 1px solid #1a1d2e;
            transition: background 0.15s;
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #252840; }

        tbody td {
            padding: 8px 10px;
            color: #cbd5e1;
        }

        tbody td:first-child { color: #64748b; font-size: 0.75rem; }

        .uid {
            font-family: monospace;
            font-size: 0.85rem;
            color: #60a5fa;
            font-weight: 600;
        }

        .device {
            color: #94a3b8;
            font-size: 0.75rem;
        }

        .temp-val { color: #f97316; font-weight: 600; }
        .hum-val  { color: #38bdf8; font-weight: 600; }
        .press-val { color: #a78bfa; font-weight: 600; }
        .gas-val  { color: #4ade80; font-weight: 600; }

        .chart-card {
            margin-top: 24px;
        }

        .chart-wrap {
            position: relative;
            height: 260px;
        }

        .empty {
            text-align: center;
            color: #475569;
            padding: 32px 0;
            font-size: 0.85rem;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            font-size: 0.78rem;
            color: #475569;
        }

        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <h1>IoT Dashboard</h1>
    <div class="status-bar">
        <div class="dot"></div>
        <span id="last-update">Waiting for data...</span>
    </div>

    <div class="grid">
        <div class="card">
            <div class="card-header">
                <span class="card-title">RFID Scans</span>
                <span class="badge badge-rfid">iot/rfid</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>UID</th>
                        <th>Device</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="rfid-body">
                    <tr><td colspan="4" class="empty">No data</td></tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">BME680 Sensor</span>
                <span class="badge badge-bme">iot/bme680</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Temp</th>
                        <th>Hum</th>
                        <th>Press</th>
                        <th>Gas</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="temp-body">
                    <tr><td colspan="6" class="empty">No data</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card chart-card">
        <div class="card-header">
            <span class="card-title">Temperature History</span>
            <span class="badge badge-bme">last 50 readings</span>
        </div>
        <div class="chart-wrap">
            <canvas id="temp-chart"></canvas>
        </div>
    </div>

    <script>
        function fmt(ts) {
            const d = new Date(ts.replace(' ', 'T') + 'Z');
            return d.toLocaleTimeString();
        }

        async function loadRfid() {
            const res = await fetch('/api/rfid');
            const rows = await res.json();
            const body = document.getElementById('rfid-body');
            if (!rows.length) {
                body.innerHTML = '<tr><td colspan="4" class="empty">No data</td></tr>';
                return;
            }
            body.innerHTML = rows.map(r => `
                <tr>
                    <td>${r.id}</td>
                    <td><span class="uid">${r.uid}</span></td>
                    <td><span class="device">${r.device_id}</span></td>
                    <td>${fmt(r.created_at)}</td>
                </tr>`).join('');
        }

        const chart = new Chart(document.getElementById('temp-chart'), {
            type: 'line',
            data: { labels: [], datasets: [{
                label: 'Temperature (°C)',
                data: [],
                borderColor: '#f97316',
                backgroundColor: 'rgba(249,115,22,0.1)',
                borderWidth: 2,
                pointRadius: 3,
                pointBackgroundColor: '#f97316',
                tension: 0.3,
                fill: true,
            }]},
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: { legend: { display: false } },
                scales: {
                    x: {
                        ticks: { color: '#64748b', maxTicksLimit: 10, maxRotation: 0 },
                        grid: { color: '#1a1d2e' },
                    },
                    y: {
                        ticks: { color: '#64748b', callback: v => v + ' °C' },
                        grid: { color: '#1a1d2e' },
                    },
                },
            },
        });

        async function loadTemp() {
            const res = await fetch('/api/temp');
            const rows = await res.json();

            const body = document.getElementById('temp-body');
            if (!rows.length) {
                body.innerHTML = '<tr><td colspan="6" class="empty">No data</td></tr>';
            } else {
                body.innerHTML = rows.map(r => `
                    <tr>
                        <td>${r.id}</td>
                        <td><span class="temp-val">${r.temp} °C</span></td>
                        <td><span class="hum-val">${r.hum} %</span></td>
                        <td><span class="press-val">${r.press} hPa</span></td>
                        <td><span class="gas-val">${r.gas} kΩ</span></td>
                        <td>${fmt(r.created_at)}</td>
                    </tr>`).join('');
            }

            const chartRows = [...rows].reverse().slice(-50);
            chart.data.labels = chartRows.map(r => fmt(r.created_at));
            chart.data.datasets[0].data = chartRows.map(r => r.temp);
            chart.update();
        }

        async function refresh() {
            await Promise.all([loadRfid(), loadTemp()]);
            document.getElementById('last-update').textContent =
                'Last update: ' + new Date().toLocaleTimeString();
        }

        refresh();
        setInterval(refresh, 5000);
    </script>
</body>
</html>
